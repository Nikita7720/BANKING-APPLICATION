<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Face ID | SecureBank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Face API JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        #video-container { position: relative; width: 320px; height: 320px; border-radius: 50%; overflow: hidden; border: 4px solid #4f46e5; margin: 0 auto; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="glass w-full max-w-md rounded-[3rem] p-8 shadow-2xl text-center border border-white">
        <a href="/staff-dashboard" class="inline-block mb-6 text-gray-400 hover:text-indigo-600 transition">
            <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
        </a>
        
        <h2 class="text-2xl font-black text-gray-800 mb-2">Register Face ID</h2>
        <p class="text-gray-500 text-sm mb-8">Please scan your face to enable secure facial attendance.</p>

        <div id="video-container" class="mb-8 shadow-inner bg-black">
            <video id="video" autoplay playsinline muted></video>
            <div id="status-overlay" class="absolute inset-0 flex items-center justify-center bg-black/60 text-white text-xs font-bold uppercase tracking-widest hidden">
                Processing...
            </div>
        </div>

        <div id="loading-models" class="mb-6 p-4 bg-indigo-50 text-indigo-600 rounded-2xl text-xs font-bold animate-pulse">
            <i class="fa-solid fa-brain mr-2"></i> Initializing Face Recognition AI...
        </div>

        <form id="regForm" action="/staff/save-face" method="POST">
            <input type="hidden" name="faceData" id="faceData">
            <button type="button" id="startScan" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition transform hover:-translate-y-1 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                Start Face Scan
            </button>
        </form>

        <p class="text-[10px] text-gray-400 mt-6 uppercase font-bold tracking-widest">
            <i class="fa-solid fa-shield-halved mr-1"></i> Biometric data is stored securely
        </p>
    </div>

    <script>
        const video = document.getElementById('video');
        const startScan = document.getElementById('startScan');
        const loadingModels = document.getElementById('loading-models');
        const faceDataInput = document.getElementById('faceData');
        const regForm = document.getElementById('regForm');

        // Load models from CDN
        async function loadModels() {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            
            loadingModels.innerText = "AI Ready! Camera access granted.";
            loadingModels.classList.remove('animate-pulse', 'bg-indigo-50', 'text-indigo-600');
            loadingModels.classList.add('bg-green-50', 'text-green-600');
            startScan.disabled = false;
        }

        async function startVideo() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;
        }

        startVideo().then(loadModels);

        startScan.addEventListener('click', async () => {
            document.getElementById('status-overlay').classList.remove('hidden');
            startScan.innerText = "Scanning...";
            startScan.disabled = true;

            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks()
                .withFaceDescriptor();

            if (detection) {
                // Save the face descriptor as a string
                faceDataInput.value = JSON.stringify(Array.from(detection.descriptor));
                
                // Show success and submit
                startScan.innerText = "Scan Complete! Saving...";
                startScan.classList.remove('bg-indigo-600');
                startScan.classList.add('bg-green-600');
                
                setTimeout(() => regForm.submit(), 1500);
            } else {
                alert("Face not detected! Please ensure you are in a well-lit area and looking directly at the camera.");
                document.getElementById('status-overlay').classList.add('hidden');
                startScan.innerText = "Start Face Scan";
                startScan.disabled = false;
            }
        });
    </script>
</body>
</html>
