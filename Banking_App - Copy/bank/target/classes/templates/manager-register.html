<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager Registration - SecureBank</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-purple-900 to-indigo-950 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-hidden my-8">
    
    <!-- Header -->
    <div class="bg-purple-700 text-white p-8 text-center">
      <h1 class="text-3xl font-bold flex items-center justify-center gap-3">
        <i class="fa-solid fa-user-tie"></i> Manager Portal
      </h1>
      <p class="text-purple-200 mt-2">Register New Administrator</p>
    </div>

    <div class="p-8">
      <div th:if="${error}" class="bg-red-100 text-red-700 p-3 rounded mb-4 text-center text-sm font-bold shadow-sm" th:text="${error}"></div>
      
      <form action="/manager-register" method="post" class="space-y-5">
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
          <div class="relative">
            <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" name="full_name" 
                   class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-600"
                   placeholder="Enter Full Name" required>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <div class="relative">
            <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="email" name="email" 
                   class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-600"
                   placeholder="example@bank.com" required>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
          <div class="relative">
            <i class="fa-solid fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="tel" name="phone" 
                   class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-600"
                   placeholder="Enter Phone Number" required>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Create Password</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="password" name="password" 
                   class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-600"
                   placeholder="Create strong password" required>
          </div>
        </div>

        <button type="submit"
                class="w-full bg-purple-700 hover:bg-purple-800 text-white font-semibold py-4 rounded-lg transition duration-300 mt-6 shadow-lg">
          Register Manager
        </button>

      </form>

      <div class="mt-6 text-center text-sm">
        <p class="text-gray-600">Already an administrator? <a href="/manager-login" class="text-purple-600 font-bold hover:underline">Login here</a></p>
      </div>
    </div>
  </div>

</body>
</html>
