<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Add Staff - Manager Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
  
  <nav class="bg-purple-800 text-white shadow-lg p-4">
    <div class="max-w-7xl mx-auto flex justify-between">
      <h1 class="text-xl font-bold"><i class="fa-solid fa-user-plus"></i> Add New Staff</h1>
      <a href="/manager-dashboard" class="hover:underline">Back to Dashboard</a>
    </div>
  </nav>

  <div class="max-w-xl mx-auto mt-10 bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    <form action="/manager/add-staff" method="post" class="space-y-4">
      <div>
        <label class="block font-medium mb-1">Full Name</label>
        <input type="text" name="fullName" required class="w-full border p-3 rounded-lg focus:outline-none focus:border-purple-600">
      </div>
      <div>
        <label class="block font-medium mb-1">Email</label>
        <input type="email" name="email" required class="w-full border p-3 rounded-lg focus:outline-none focus:border-purple-600">
      </div>
      <div>
        <label class="block font-medium mb-1">Phone Number</label>
        <input type="text" name="phone" required class="w-full border p-3 rounded-lg focus:outline-none focus:border-purple-600">
      </div>
      <div>
        <label class="block font-medium mb-1">Temporary Password</label>
        <input type="password" name="password" required class="w-full border p-3 rounded-lg focus:outline-none focus:border-purple-600">
      </div>
      <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-lg transition mt-4">
        Register Staff Member
      </button>
    </form>
  </div>

</body>
</html>
