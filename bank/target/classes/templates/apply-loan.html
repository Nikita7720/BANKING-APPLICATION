<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply for Loan - SecureBank</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

  <!-- Header -->
  <div class="bg-gradient-to-r from-blue-700 to-indigo-800 text-white shadow-lg relative pb-6">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <a href="/customer-dashboard" class="text-white hover:text-blue-200 transition">
          <i class="fa-solid fa-arrow-left text-xl"></i>
        </a>
        <span class="font-bold text-xl tracking-wide">Loan Application</span>
      </div>
    </div>
  </div>

  <main class="max-w-2xl mx-auto px-4 py-8">
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
      
      <!-- Banner -->
      <div class="bg-indigo-50 p-6 text-center border-b border-indigo-100">
        <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl shadow-sm">
          <i class="fa-solid fa-hand-holding-dollar"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800">Apply for a New Loan</h2>
        <p class="text-sm text-gray-500 mt-1">Get instant approval at the lowest interest rates.</p>
      </div>

      <div class="p-8">
        <div th:if="${msg}" class="bg-blue-100 text-blue-700 p-4 rounded-lg mb-6 text-sm font-semibold text-center shadow-sm" th:text="${msg}"></div>

        <!-- Loan Application Form -->
        <form action="/loan-send-otp" method="post" enctype="multipart/form-data" class="space-y-6">
          
          <!-- Section 1: Auto-Fetched Details -->
          <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
            <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2"><i class="fa-solid fa-user-check text-green-600"></i> Verified Identity Details</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Account Number</label>
                <input type="text" name="accountNumber" th:value="${user.accountNumber}" readonly
                       class="w-full bg-gray-100 border-gray-300 text-gray-600 font-semibold p-3 rounded-lg cursor-not-allowed">
              </div>
              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">PAN Card</label>
                <input type="text" name="pan" th:value="${user.pan}" readonly
                       class="w-full bg-gray-100 border-gray-300 text-gray-600 font-semibold p-3 rounded-lg cursor-not-allowed uppercase">
              </div>
              <div class="md:col-span-2">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Aadhar Number</label>
                <input type="text" name="aadhar" th:value="${user.aadhar}" readonly
                       class="w-full bg-gray-100 border-gray-300 text-gray-600 font-semibold p-3 rounded-lg cursor-not-allowed">
              </div>
            </div>
          </div>

          <!-- Section 2: Loan Requirements -->
          <div>
            <h3 class="font-bold text-gray-700 mb-3 border-b pb-2">Loan Details</h3>
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Employment Type</label>
                <select name="employmentType" required class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                  <option value="" disabled selected>Select your employment status...</option>
                  <option value="Salaried">Salaried Employee</option>
                  <option value="Business">Self-Employed / Business</option>
                </select>
              </div>

              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-bold text-gray-700 mb-1">Monthly Income (₹)</label>
                  <input type="number" name="monthlyIncome" placeholder="e.g. 50000" required min="1000"
                         class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-gray-700">
                </div>
                <div>
                  <label class="block text-sm font-bold text-gray-700 mb-1">Loan Amount (₹)</label>
                  <input type="number" name="amount" placeholder="e.g. 500000" required min="10000" max="5000000"
                         class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-indigo-700">
                </div>
              </div>
              
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-bold text-gray-700 mb-1">Duration (Months)</label>
                  <select name="duration" required class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                    <option value="12">12 Months (1 Year)</option>
                    <option value="24">24 Months (2 Years)</option>
                    <option value="36">36 Months (3 Years)</option>
                    <option value="60">60 Months (5 Years)</option>
                  </select>
                </div>
                <div>
                  <label class="block text-sm font-bold text-gray-700 mb-1">Loan Purpose</label>
                  <input type="text" name="purpose" placeholder="e.g. Home Renovation, Education, Business" required
                         class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
              </div>
            </div>
          </div>

          <!-- Section 3: Document Upload -->
          <div>
            <h3 class="font-bold text-gray-700 mb-3 border-b pb-2">Document Upload</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <!-- Salary Slip / Bank Statement -->
              <div class="border border-gray-200 bg-gray-50 p-4 rounded-xl text-center hover:bg-gray-100 transition duration-300">
                <label class="block text-sm font-bold text-gray-700 mb-1 cursor-pointer">
                  Salary Slip / Bank Statement
                  <input type="file" name="document" required class="mt-2 block w-full text-xs text-gray-500 file:mr-4 file:py-1 file:px-3 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                </label>
              </div>

              <!-- Aadhar Card Photo -->
              <div class="border border-gray-200 bg-gray-50 p-4 rounded-xl text-center hover:bg-gray-100 transition duration-300">
                <label class="block text-sm font-bold text-gray-700 mb-1 cursor-pointer">
                  Aadhar Card Photo
                  <input type="file" name="aadharCardPhoto" required class="mt-2 block w-full text-xs text-gray-500 file:mr-4 file:py-1 file:px-3 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                </label>
              </div>

              <!-- PAN Card Photo -->
              <div class="border border-gray-200 bg-gray-50 p-4 rounded-xl text-center hover:bg-gray-100 transition duration-300">
                <label class="block text-sm font-bold text-gray-700 mb-1 cursor-pointer">
                  PAN Card Photo
                  <input type="file" name="panCardPhoto" required class="mt-2 block w-full text-xs text-gray-500 file:mr-4 file:py-1 file:px-3 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                </label>
              </div>

              <!-- Passport Photo -->
              <div class="border border-gray-200 bg-gray-50 p-4 rounded-xl text-center hover:bg-gray-100 transition duration-300">
                <label class="block text-sm font-bold text-gray-700 mb-1 cursor-pointer">
                  Passport Size Photo
                  <input type="file" name="userPhoto" required class="mt-2 block w-full text-xs text-gray-500 file:mr-4 file:py-1 file:px-3 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                </label>
              </div>

              <!-- Signature -->
              <div class="md:col-span-2 border border-gray-200 bg-gray-50 p-4 rounded-xl text-center hover:bg-gray-100 transition duration-300">
                <label class="block text-sm font-bold text-gray-700 mb-1 cursor-pointer">
                  Signature
                  <input type="file" name="signature" required class="mt-2 block w-full text-xs text-gray-500 file:mr-4 file:py-1 file:px-3 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                </label>
              </div>
            </div>
          </div>

          <!-- Terms -->
          <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
            <label class="flex items-start gap-3 cursor-pointer">
              <input type="checkbox" required class="mt-1 w-5 h-5 accent-indigo-600 rounded cursor-pointer">
              <span class="text-sm text-gray-600">
                I agree to the <a href="#" class="text-indigo-600 font-semibold hover:underline">Terms & Conditions</a> for this loan application. I declare that the information provided is correct and the uploaded documents are authentic. I consent to an OTP verification via my registered email.
              </span>
            </label>
          </div>

          <!-- Submit -->
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl text-lg transition duration-300 shadow-lg flex items-center justify-center gap-2">
            Proceed to Verification <i class="fa-solid fa-arrow-right"></i>
          </button>

        </form>
      </div>
    </div>
  </main>

</body>
</html>
