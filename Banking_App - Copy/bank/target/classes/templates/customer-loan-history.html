<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loan History - SecureBank</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .glass {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen pb-20">

  <!-- Top Navigation & Header -->
  <div class="bg-gradient-to-br from-blue-700 to-indigo-800 text-white rounded-b-3xl shadow-lg relative pb-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <!-- Back Button -->
        <a th:href="@{'/customer-dashboard/' + ${app != null ? app.id : ''}}" class="text-white hover:text-blue-200 transition">
          <i class="fa-solid fa-arrow-left text-2xl"></i>
        </a>
        <div>
          <h1 class="text-2xl font-bold">Loan History</h1>
        </div>
      </div>
    </div>
  </div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 -mt-10 relative z-10">
    <!-- My Loans Section -->
    <div class="mb-8" th:if="${myLoans != null}">
      <div th:if="${#lists.isEmpty(myLoans)}" class="bg-white rounded-2xl p-8 text-center shadow-lg border border-gray-100">
         <i class="fa-solid fa-clock-rotate-left text-5xl text-gray-300 mb-4"></i>
         <h3 class="text-xl font-bold text-gray-700">No Loan History</h3>
         <p class="text-gray-500 mt-2">You haven't applied for any loans yet.</p>
         <a href="/apply-loan" class="mt-6 inline-block bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition">Apply for a Loan</a>
      </div>
      
      <div th:if="${not #lists.isEmpty(myLoans)}" class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden hover:shadow-xl transition-shadow duration-300">
        <div class="p-5 border-b border-gray-50 bg-gradient-to-r from-gray-50 to-white flex items-center gap-4">
          <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center text-xl shadow-inner border border-blue-100/50">
            <i class="fa-solid fa-clock-rotate-left"></i>
          </div>
          <div>
            <h4 class="font-bold text-gray-800 text-lg">Recent Applications</h4>
            <p class="text-xs text-gray-500 font-medium">Track the status of your past and current loan requests</p>
          </div>
        </div>
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-100">
            <thead class="bg-gray-50/50">
              <tr>
                <th class="px-6 py-4 text-left text-xs font-bold text-gray-400 uppercase tracking-wider">Loan Details</th>
                <th class="px-6 py-4 text-center text-xs font-bold text-gray-400 uppercase tracking-wider">Date Applied</th>
                <th class="px-6 py-4 text-center text-xs font-bold text-gray-400 uppercase tracking-wider">Tenure</th>
                <th class="px-6 py-4 text-center text-xs font-bold text-gray-400 uppercase tracking-wider">Status</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-50 bg-white">
              <tr th:each="loan : ${myLoans}" class="hover:bg-blue-50/30 transition group">
                <td class="px-6 py-4 whitespace-nowrap">
                  <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-blue-100 group-hover:text-blue-600 transition border border-gray-100 group-hover:border-blue-200">
                      <i class="fa-solid fa-file-invoice-dollar"></i>
                    </div>
                    <div>
                      <div class="font-bold text-gray-800 text-base" th:text="'₹' + ${loan.amount}"></div>
                      <div class="text-xs text-gray-500 font-medium mt-0.5" th:text="${loan.purpose}"></div>
                    </div>
                  </div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-center">
                  <span class="text-sm font-semibold text-gray-600" th:text="${#temporals.format(loan.requestDate, 'dd MMM yyyy')}"></span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-center">
                  <span class="text-sm text-gray-700 font-bold bg-gray-50 border border-gray-100 px-3 py-1 rounded-md" th:text="${loan.durationMonths} + ' mo'"></span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-center">
                  <span th:if="${loan.status == 'APPROVED'}" class="inline-flex items-center gap-1.5 bg-green-50 text-green-700 px-3 py-1.5 rounded-full text-xs font-bold border border-green-200 shadow-sm"><i class="fa-solid fa-circle-check"></i> Approved</span>
                  <span th:if="${loan.status == 'PENDING_STAFF_REVIEW' or loan.status == 'PENDING_MANAGER_APPROVAL'}" class="inline-flex items-center gap-1.5 bg-yellow-50 text-yellow-700 px-3 py-1.5 rounded-full text-xs font-bold border border-yellow-200 shadow-sm"><i class="fa-solid fa-clock"></i> Processing</span>
                  <span th:if="${loan.status == 'REJECTED' or loan.status == 'REJECTED_BY_STAFF' or loan.status == 'REJECTED_BY_MANAGER' or loan.status == 'REJECTED_AUTOMATICALLY'}" class="inline-flex items-center gap-1.5 bg-red-50 text-red-700 px-3 py-1.5 rounded-full text-xs font-bold border border-red-200 shadow-sm"><i class="fa-solid fa-circle-xmark"></i> Rejected</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
