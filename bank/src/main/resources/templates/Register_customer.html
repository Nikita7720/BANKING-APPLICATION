<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureBank - Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gradient-to-br from-blue-900 to-blue-950 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-hidden">

    <!-- Header -->
    <div class="bg-blue-700 text-white p-8 text-center">
      <h1 class="text-3xl font-bold flex items-center justify-center gap-3">
        <i class="fa-solid fa-shield-halved"></i> SecureBank
      </h1>
      <p class="text-blue-200 mt-2">Create New Account</p>
    </div>

    <div class="p-8">
      <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">Sign Up</h2>

      <form action="/saveRegisterUser " id="registerForm" class="space-y-5" method="post">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
          <input type="text" id="fullName" name="full_name"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600"
            placeholder="Enter your full name" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input type="email" id="email" name="email"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600"
            placeholder="example@email.com" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
          <input type="tel" id="phone"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600"
            placeholder="+91 XXXXXXXXXX" name="phone" required>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Account Type</label>
            <select id="accountType" name="accountType"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600">
              <option value="">Select Type</option>
              <option value="savings">Savings Account</option>
              <option value="current">Current Account</option>
              <option value="salary">Salary Account</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Date of Birth</label>
            <input type="date" id="dob" name="dob"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Create Password</label>
          <input type="password" id="password"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600"
            placeholder="Create strong password" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
          <input type="password" id="confirmPassword"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600"
            placeholder="Confirm password" name="password">
        </div>

        <div class="flex items-start gap-2 text-sm">
          <input type="checkbox" id="terms" class="mt-1 accent-blue-600" required>
          <label for="terms" class="text-gray-600">
            I agree to the <a href="#" class="text-blue-600 hover:underline">Terms & Conditions</a> and
            <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a>
          </label>
        </div>

        <button type="submit"
          class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-4 rounded-lg transition duration-300">
          Create Account
        </button>

      </form>

      <div class="mt-6 text-center">
        <p class="text-sm text-gray-600">
          Already have an account?
          <a href="login_customer" class="text-blue-600 hover:underline font-medium">Login here</a>
        </p>
      </div>
    </div>

    <!-- Footer -->
    <div class="border-t p-4 text-center text-xs text-gray-500">
      <p>© 2026 SecureBank. All rights reserved.</p>
    </div>
  </div>
  <div th:if="${msg}" style="background:#d4edda;padding:15px;color:green;margin-top:20px;">
    <span th:text="${msg}"></span>
  </div>
