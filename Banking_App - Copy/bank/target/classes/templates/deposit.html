<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>   
<style>
body {
    font-family: Arial;
    background: #eef4ff;
}

.box {
    width: 400px;
    margin: auto;
    margin-top: 80px;
    background: white;
    padding: 35px;
    border-radius: 20px;
    box-shadow: 0 0 15px gray;
}

h2 {
    text-align: center;
    color: darkblue;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
}
</style>

<script src="https://unpkg.com/html5-qrcode"></script>

<body class="body">

<div class="box">
<h2>Deposit Money</h2>

<!-- QR Scanner UI -->
<div id="reader" style="width: 100%; display: none; margin-bottom: 20px; border-radius: 10px; overflow: hidden;"></div>
<button type="button" id="scanBtn" style="background: #10b981; margin-bottom: 15px; cursor: pointer; width: 100%; padding: 12px; color: white; border: none; font-weight: bold;">
    Scan QR Code
</button>

<form action="/saveDeposit" method="post">

Account Number / UPI ID
<input id="accountNumber" name="accountNumber" placeholder="Enter Account Number or @upi_id"
       th:value="${loggedInUpi != null ? loggedInUpi : (loggedInAccount != null ? loggedInAccount : '')}">

Amount
<input name="amount" placeholder="Enter Amount">

<button type="submit">
Deposit
</button>

</form>
</div>

<script>
    const scanBtn = document.getElementById('scanBtn');
    const readerDiv = document.getElementById('reader');
    const accInput = document.getElementById('accountNumber');
    let html5QrcodeScanner = null;

    scanBtn.addEventListener('click', () => {
        if (readerDiv.style.display === 'none') {
            readerDiv.style.display = 'block';
            scanBtn.innerText = 'Stop Scanning';
            scanBtn.style.background = '#ef4444';
            
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            html5QrcodeScanner.render(onScanSuccess, onScanError);
        } else {
            stopScanner();
        }
    });

    function onScanSuccess(decodedText) {
        let finalId = decodedText;
        if (decodedText.startsWith('upi://pay?')) {
            const urlParams = new URLSearchParams(decodedText.split('?')[1]);
            finalId = urlParams.get('pa');
        }
        accInput.value = finalId;
        stopScanner();
    }

    function onScanError(err) {}

    function stopScanner() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear();
        }
        readerDiv.style.display = 'none';
        scanBtn.innerText = 'Scan QR Code';
        scanBtn.style.background = '#10b981';
    }
</script>

<script th:if="${msg}">
    Swal.fire({
        title: 'Message',
        text: '[[${msg}]]',
        icon: 'success'
    });
    setTimeout(function() {
        window.location.href = "/customer-dashboard/" + '[[${redirectId}]]';
    }, 2000);
</script>

</body>
</html>
