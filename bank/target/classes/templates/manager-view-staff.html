<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>View Staff - Manager Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
  
  <nav class="bg-purple-800 text-white shadow-lg p-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold"><i class="fa-solid fa-users"></i> Staff Directory</h1>
      <div class="flex items-center gap-4">
        <a href="/manager/add-staff" class="bg-white text-purple-800 hover:bg-purple-100 px-4 py-2 rounded-lg text-sm font-bold transition shadow-sm">
          <i class="fa-solid fa-user-plus"></i> Add New Staff
        </a>
        <a href="/manager-dashboard" class="hover:underline text-sm font-medium"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
      </div>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto mt-10 bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    <div th:if="${success}" class="bg-green-100 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-6 shadow-sm" role="alert">
      <span class="block sm:inline" th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="bg-red-100 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6 shadow-sm" role="alert">
      <span class="block sm:inline" th:text="${error}"></span>
    </div>
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-purple-100 text-purple-800">
          <th class="p-4 border-b">Emp ID</th>
          <th class="p-4 border-b">Name</th>
          <th class="p-4 border-b">Email</th>
          <th class="p-4 border-b">Phone</th>
          <th class="p-4 border-b">Action</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="staff : ${staffList}" class="hover:bg-gray-50 transition border-b">
          <td class="p-4 font-semibold text-purple-700" th:text="${staff.employeeId}">EMP-001</td>
          <td class="p-4" th:text="${staff.full_name}">Jane Doe</td>
          <td class="p-4" th:text="${staff.email}">jane@bank.com</td>
          <td class="p-4" th:text="${staff.phone}">9876543210</td>
          <td class="p-4">
            <div class="flex items-center gap-2">
              <a th:href="@{/manager/staff-salary/{id}(id=${staff.id})}" class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1.5 rounded-lg text-sm font-semibold transition flex items-center gap-1 shadow-sm">
                <i class="fa-solid fa-money-check-dollar"></i> Salary & PF
              </a>
              <form th:action="@{/manager/delete-staff/{id}(id=${staff.id})}" method="post" onsubmit="return confirm('Are you sure you want to permanently delete this staff member? This action cannot be undone.');">
                <button type="submit" class="bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1.5 rounded-lg text-sm font-semibold transition flex items-center gap-1 shadow-sm">
                  <i class="fa-solid fa-trash"></i> Delete
                </button>
              </form>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(staffList)}">
          <td colspan="5" class="p-4 text-center text-gray-500">No staff members found.</td>
        </tr>
      </tbody>
    </table>
  </div>

</body>
</html>
