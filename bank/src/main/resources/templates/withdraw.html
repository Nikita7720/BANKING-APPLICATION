<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


<style>
    body{
font-family:Arial;
background:#eef4ff;
}

.box{
width:400px;
margin:auto;
margin-top:80px;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 0 15px gray;
}

h2{
text-align:center;
color:darkblue;
}

input{
width:100%;
padding:12px;
margin-top:15px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#2563eb;
color:white;
border:none;
}
</style>
<body>
    
<div class="box">
<form action="/savewithdraw" method="post">

Account Number
<input name="accountNumber">

Amount
<input name="amount">

<button type="submit">Withdraw</button>


</form>
</div>

<script th:if="${msg}">
    alert('[[${msg}]]');

    setTimeout(function() {
        window.location.href = "/customer-dashboard/" + '[[${redirectId}]]';
    }, 1);
</script>


</body>
