<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Pending Accounts - Staff Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
  
  <nav class="bg-teal-800 text-white shadow-lg p-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold"><i class="fa-solid fa-id-card"></i> Pending Account Approvals</h1>
      <a href="/staff-dashboard" class="hover:underline">Back to Dashboard</a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto mt-10 px-4">
    <div th:if="${success}" class="bg-green-100 text-green-700 p-4 rounded mb-6 font-semibold" th:text="${success}"></div>

    <div class="bg-white rounded-xl shadow-lg border border-gray-100 overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-teal-100 text-teal-800">
            <th class="p-4 border-b">Customer Name</th>
            <th class="p-4 border-b">Status</th>
            <th class="p-4 border-b">Application</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="acc : ${accounts}" class="hover:bg-gray-50 transition border-b">
            <td class="p-4 font-bold text-gray-800" th:text="${acc.fullname}">Name</td>
            <td class="p-4 font-semibold" 
                th:classappend="${acc.status == 'Approved'} ? 'text-green-600' : (${acc.status == 'Rejected'} ? 'text-red-600' : 'text-yellow-600')"
                th:text="${acc.status}">Pending</td>
            <td class="p-4">
              <a th:href="@{'/staff/view-account/' + ${acc.id}}" class="text-indigo-600 hover:text-indigo-800 font-bold underline transition inline-block">
                View Form
              </a>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(accounts)}">
            <td colspan="6" class="p-8 text-center text-gray-500 text-lg">
              <i class="fa-solid fa-check-double text-4xl text-teal-300 mb-2 block"></i>
              No pending account applications!
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</body>
</html>
