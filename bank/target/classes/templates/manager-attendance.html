<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Staff Attendance - Manager Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
  
  <nav class="bg-purple-800 text-white shadow-lg p-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold"><i class="fa-solid fa-clipboard-user"></i> Staff Attendance</h1>
      <a href="/manager-dashboard" class="hover:underline text-sm font-medium"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto mt-10 px-4">
    <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-100">
      
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Attendance Log</h2>
        <p class="text-gray-500 text-sm">Showing all recent check-ins and check-outs.</p>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-purple-50 text-purple-800 uppercase text-xs tracking-wider">
              <th class="p-4 border-b font-semibold rounded-tl-lg">Date</th>
              <th class="p-4 border-b font-semibold">Employee ID</th>
              <th class="p-4 border-b font-semibold">Check In Time</th>
              <th class="p-4 border-b font-semibold">Check Out Time</th>
              <th class="p-4 border-b font-semibold rounded-tr-lg">Status</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
            <tr th:each="att : ${attendanceList}" class="hover:bg-gray-50 transition">
              <td class="p-4 font-medium text-gray-800" th:text="${att.attendanceDate}">2026-05-09</td>
              <td class="p-4 font-semibold text-purple-700" th:text="${att.employeeId}">EMP-001</td>
              <td class="p-4 text-gray-600" th:text="${att.checkInTime}">09:00 AM</td>
              <td class="p-4 text-gray-600" th:text="${att.checkOutTime != null ? att.checkOutTime : '--:--'}">05:00 PM</td>
              <td class="p-4">
                <span th:if="${att.status == 'PRESENT' and att.checkOutTime == null}" class="px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700">PRESENT</span>
                <span th:if="${att.status == 'PRESENT' and att.checkOutTime != null}" class="px-3 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-700"><i class="fa-solid fa-check-double mr-1"></i> Shift Completed</span>
                <span th:if="${att.status == 'ABSENT'}" class="px-3 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700">ABSENT</span>
                <span th:if="${att.status != 'PRESENT' and att.status != 'ABSENT'}" class="px-3 py-1 rounded-full text-xs font-bold bg-yellow-100 text-yellow-700" th:text="${att.status}"></span>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(attendanceList)}">
              <td colspan="5" class="p-12 text-center text-gray-400">
                <i class="fa-solid fa-calendar-xmark text-4xl mb-3"></i>
                <p>No attendance records found.</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

</body>
</html>
