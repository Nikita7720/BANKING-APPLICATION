<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Statement</title>

<style>
body{
font-family:Arial;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid black;
padding:10px;
text-align:center;
}

h2{
text-align:center;
}
</style>

</head>

<body onload="window.print()">

<h2>Bank Statement</h2>

<p>Account No: <span th:text="${accNo}"></span></p>

<table>
<tr>
<th>No</th>
<th>Date</th>
<th>Type</th>
<th>Amount</th>
</tr>

<tr th:each="t, stat : ${transactions}">
<td th:text="${transactions.size() - stat.index}"></td>
<td th:text="${t.dateTime}"></td>
<td th:text="${t.type}"></td>
<td th:text="${t.amount}"></td>
</tr>

</table>

</body>
</html>
