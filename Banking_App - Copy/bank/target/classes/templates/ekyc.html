<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-KYC Verification - SecureBank</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gray-50 text-gray-800 font-sans min-h-screen pb-20">

  <!-- Header -->
  <div class="bg-gradient-to-br from-indigo-700 to-blue-800 text-white rounded-b-3xl shadow-lg relative pb-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <a href="/customer-dashboard" class="text-white hover:text-blue-200 transition">
          <i class="fa-solid fa-arrow-left text-xl"></i>
        </a>
        <span class="font-bold text-xl tracking-wide">e-KYC Verification</span>
      </div>
    </div>
  </div>

  <main class="max-w-md mx-auto px-4 py-10">
    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">

      <div class="bg-indigo-50 p-6 text-center border-b border-indigo-100">
        <div
          class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl shadow-sm">
          <i class="fa-solid fa-fingerprint"></i>
        </div>
        <h2 class="text-xl font-bold text-gray-800">Complete your KYC</h2>
        <p class="text-sm text-gray-500 mt-1">Verify your identity instantly using PAN.</p>
      </div>

      <div class="p-6">
        <div th:if="${msg}" class="bg-blue-100 text-blue-700 p-3 rounded-lg mb-5 text-sm font-semibold text-center"
          th:text="${msg}"></div>

        <!-- Step 1: Send OTP -->
        <form action="/sendOtp" method="post" class="space-y-4">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Account Number</label>
            <input type="text" name="accountNumber" th:value="${accountNumber}" placeholder="e.g. 1234567890" required
              class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 uppercase">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Aadhar Card Number</label>
            <input type="text" name="aadharNumber" th:value="${aadharNumber}" placeholder="e.g. 98641234F" required
              class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 uppercase">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">PAN Card Number</label>
            <input type="text" name="pan" th:value="${pan}" placeholder="e.g. ABCDE1234F" required
              class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 uppercase">
          </div>
          <button type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition shadow-md">
            Send OTP
          </button>
        </form>

        <hr class="my-6 border-gray-200">

        <!-- Step 2: Verify OTP -->
        <form action="/verifyOtp" method="post" class="space-y-4">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Enter OTP</label>
            <input type="text" name="otp" placeholder="6-digit OTP sent to email" required maxlength="6"
              class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-center tracking-widest font-mono text-lg">
          </div>
          <button type="submit"
            class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition shadow-md">
            Verify & Complete KYC
          </button>
        </form>

      </div>
    </div>
  </main>

</body>

</html>
