<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help & Support | SecureBank</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="bg-indigo-700 text-white pb-20 pt-10 px-4">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <div>
        <a href="/customer-dashboard/1" class="text-indigo-200 hover:text-white transition flex items-center gap-2 mb-2">
          <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
        </a>
        <h1 class="text-3xl font-extrabold">Help & Support</h1>
        <p class="text-indigo-100 mt-1">How can we assist you today?</p>
      </div>
      <i class="fa-solid fa-headset text-6xl opacity-20"></i>
    </div>
  </div>

  <main class="max-w-4xl mx-auto px-4 -mt-12">
    
    <div th:if="${success}" class="bg-green-100 border border-green-200 text-green-700 px-4 py-3 rounded-xl mb-6 shadow-sm flex items-center gap-3">
      <i class="fa-solid fa-circle-check text-xl"></i>
      <span th:text="${success}"></span>
    </div>

    <div class="grid md:grid-cols-3 gap-8">
      <!-- Form Section -->
      <div class="md:col-span-2 bg-white rounded-3xl p-8 shadow-xl border border-gray-100">
        <h3 class="text-xl font-bold text-gray-800 mb-6">Submit a New Query</h3>
        <form action="/submit-query" method="post" class="space-y-4">
          <div>
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Subject</label>
            <input type="text" name="subject" required placeholder="e.g. Transaction Issue, Card Inquiry" 
                   class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Detailed Message</label>
            <textarea name="message" required rows="5" placeholder="Please describe your problem in detail..." 
                      class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition"></textarea>
          </div>
          <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition transform hover:-translate-y-1">
            Send Message <i class="fa-solid fa-paper-plane ml-2"></i>
          </button>
        </form>
      </div>

      <!-- Previous Queries -->
      <div class="bg-white rounded-3xl p-6 shadow-xl border border-gray-100 h-fit">
        <h3 class="text-lg font-bold text-gray-800 mb-4">Your Recent Queries</h3>
        <div th:if="${myQueries == null or myQueries.isEmpty()}" class="text-center py-10">
          <i class="fa-solid fa-message text-gray-200 text-4xl mb-2"></i>
          <p class="text-sm text-gray-400">No previous queries</p>
        </div>
        <div class="space-y-3">
          <div th:each="q : ${myQueries}" class="p-3 bg-gray-50 rounded-2xl border border-gray-100">
            <div class="flex justify-between items-start mb-1">
              <p class="text-xs font-bold text-gray-700 truncate mr-2" th:text="${q.subject}"></p>
              <span th:if="${q.status == 'PENDING'}" class="text-[8px] bg-yellow-100 text-yellow-700 px-1.5 py-0.5 rounded uppercase font-bold">Pending</span>
              <span th:if="${q.status == 'RESOLVED'}" class="text-[8px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded uppercase font-bold">Resolved</span>
            </div>
            <p class="text-[10px] text-gray-400" th:text="${#temporals.format(q.createdAt, 'dd MMM yyyy')}"></p>
          </div>
        </div>
      </div>
    </div>

    <!-- Contact Info -->
    <div class="mt-12 grid grid-cols-1 md:grid-cols-3 gap-6 pb-20">
      <div class="bg-white p-6 rounded-2xl shadow-md flex items-center gap-4 border border-gray-100">
        <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-xl">
          <i class="fa-solid fa-phone"></i>
        </div>
        <div>
          <p class="text-xs text-gray-400 font-bold uppercase">Call Us</p>
          <p class="text-gray-800 font-bold font-mono">1800-SECURE-BANK</p>
        </div>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-md flex items-center gap-4 border border-gray-100">
        <div class="w-12 h-12 bg-pink-100 text-pink-600 rounded-full flex items-center justify-center text-xl">
          <i class="fa-solid fa-envelope"></i>
        </div>
        <div>
          <p class="text-xs text-gray-400 font-bold uppercase">Email Support</p>
          <p class="text-gray-800 font-bold">support@securebank.com</p>
        </div>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-md flex items-center gap-4 border border-gray-100">
        <div class="w-12 h-12 bg-teal-100 text-teal-600 rounded-full flex items-center justify-center text-xl">
          <i class="fa-solid fa-location-dot"></i>
        </div>
        <div>
          <p class="text-xs text-gray-400 font-bold uppercase">Visit Branch</p>
          <p class="text-gray-800 font-bold">Mumbai Central, India</p>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
