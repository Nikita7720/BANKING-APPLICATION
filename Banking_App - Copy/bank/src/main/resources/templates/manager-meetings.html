<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Meeting Scheduler - Manager Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
  
  <nav class="bg-purple-800 text-white shadow-lg p-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold"><i class="fa-solid fa-video"></i> Meeting Scheduler</h1>
      <a href="/manager-dashboard" class="hover:underline text-sm font-medium"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto mt-10 px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
    
    <!-- Schedule Form -->
    <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-lg border border-gray-100 h-fit">
      <h2 class="text-xl font-bold text-gray-800 mb-6 border-b pb-2"><i class="fa-solid fa-calendar-plus text-purple-600"></i> Schedule New Meeting</h2>
      
      <div th:if="${success}" class="bg-green-100 text-green-700 p-3 rounded-lg mb-4 text-sm font-bold shadow-sm" th:text="${success}"></div>

      <form action="/manager/meetings/schedule" method="post" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Meeting Title</label>
          <input type="text" name="title" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-purple-500 focus:outline-none" placeholder="e.g. Monthly Performance Review" required>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Date</label>
            <input type="date" name="meetingDate" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-purple-500 focus:outline-none" required>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Time</label>
            <input type="time" name="meetingTime" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-purple-500 focus:outline-none" required>
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Meeting Link / Location</label>
          <input type="text" name="meetingLink" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-purple-500 focus:outline-none" placeholder="e.g. Google Meet Link or Room 1" required>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Description / Agenda</label>
          <textarea name="description" rows="3" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-purple-500 focus:outline-none" placeholder="Agenda of the meeting..."></textarea>
        </div>

        <button type="submit" class="w-full bg-purple-700 hover:bg-purple-800 text-white font-bold py-3 rounded-xl transition shadow-md flex justify-center items-center gap-2">
          <i class="fa-solid fa-paper-plane"></i> Schedule Meeting
        </button>
      </form>
    </div>

    <!-- Meetings List -->
    <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-lg border border-gray-100">
      <h2 class="text-xl font-bold text-gray-800 mb-6 border-b pb-2"><i class="fa-solid fa-list text-purple-600"></i> Upcoming Meetings</h2>
      
      <div class="space-y-4">
        
        <div th:each="meeting : ${meetings}" class="border border-purple-100 bg-purple-50 p-4 rounded-xl shadow-sm hover:shadow-md transition">
          <div class="flex justify-between items-start mb-2">
            <h3 class="font-bold text-lg text-purple-900" th:text="${meeting.title}">Meeting Title</h3>
            <span class="bg-purple-200 text-purple-800 text-xs font-bold px-3 py-1 rounded-full"><i class="fa-regular fa-clock"></i> <span th:text="${meeting.meetingTime}">10:00 AM</span></span>
          </div>
          <p class="text-sm text-gray-600 mb-3" th:text="${meeting.description}">Meeting agenda goes here.</p>
          <div class="flex items-center gap-4 text-sm font-semibold text-gray-500">
            <span class="flex items-center gap-1"><i class="fa-regular fa-calendar text-purple-500"></i> <span th:text="${meeting.meetingDate}">2026-05-10</span></span>
            <span class="flex items-center gap-1"><i class="fa-solid fa-link text-purple-500"></i> <a th:href="${meeting.meetingLink}" target="_blank" class="text-purple-600 hover:underline" th:text="${meeting.meetingLink}">Link</a></span>
          </div>
        </div>

        <div th:if="${#lists.isEmpty(meetings)}" class="text-center p-8 text-gray-400">
          <i class="fa-solid fa-mug-hot text-5xl mb-3"></i>
          <p>No upcoming meetings scheduled.</p>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
