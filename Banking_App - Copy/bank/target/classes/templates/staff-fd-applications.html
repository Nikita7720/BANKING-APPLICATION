<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FD Applications - Staff | NexaBank</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen pb-16">

  <!-- Header -->
  <div class="bg-gradient-to-r from-blue-700 to-indigo-800 text-white rounded-b-3xl shadow-lg pb-14">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-6 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <a href="/staff-dashboard" class="text-white hover:text-blue-200 transition">
          <i class="fa-solid fa-arrow-left text-xl"></i>
        </a>
        <div>
          <h1 class="text-2xl font-bold">FD Applications</h1>
          <p class="text-blue-200 text-sm">Review and verify customer Fixed Deposit requests</p>
        </div>
      </div>
      <span class="bg-yellow-400 text-yellow-900 font-bold px-4 py-1.5 rounded-full text-sm">
        <i class="fa-solid fa-clock mr-1"></i>Pending Staff Review
      </span>
    </div>
  </div>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 -mt-10 relative z-10">

    <!-- Flash Messages -->
    <div th:if="${success}" class="mb-4 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl flex items-center gap-2">
      <i class="fa-solid fa-circle-check"></i> <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl flex items-center gap-2">
      <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}"></span>
    </div>

    <!-- Empty State -->
    <div th:if="${fds == null or fds.isEmpty()}" class="bg-white rounded-2xl p-12 text-center shadow-lg border border-gray-100">
      <i class="fa-solid fa-piggy-bank text-6xl text-gray-200 mb-4"></i>
      <h3 class="text-xl font-bold text-gray-700 mb-2">No Pending FD Applications</h3>
      <p class="text-gray-400">All FD applications have been reviewed.</p>
    </div>

    <!-- FD Cards -->
    <div th:if="${fds != null and !fds.isEmpty()}" class="space-y-4">
      <div th:each="fd : ${fds}" class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden hover:shadow-xl transition-shadow duration-300">
        <div class="h-1.5 bg-gradient-to-r from-yellow-400 to-orange-400"></div>
        <div class="p-6">
          <div class="flex flex-col md:flex-row md:items-start justify-between gap-4">

            <!-- Customer Info -->
            <div class="flex items-start gap-4">
              <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center text-xl font-bold">
                <i class="fa-solid fa-user"></i>
              </div>
              <div>
                <h4 class="font-bold text-gray-800 text-base" th:text="${fd.customerName != null ? fd.customerName : 'Customer'}">Customer</h4>
                <p class="text-sm text-gray-500" th:text="${fd.customerEmail}">email</p>
                <p class="text-xs text-gray-400 mt-1"><i class="fa-solid fa-hashtag mr-1"></i><span th:text="${fd.fdNumber}">FD000</span></p>
              </div>
            </div>

            <!-- FD Details -->
            <div class="flex flex-wrap gap-6">
              <div class="text-center">
                <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-1">Principal</p>
                <p class="text-2xl font-extrabold text-gray-800">₹<span th:text="${#numbers.formatDecimal(fd.principalAmount, 0, 'COMMA', 2, 'POINT')}">0</span></p>
              </div>
              <div class="text-center">
                <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-1">Tenure</p>
                <p class="text-2xl font-extrabold text-indigo-600" th:text="${fd.tenureMonths} + ' Mo'">0 Mo</p>
              </div>
              <div class="text-center">
                <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-1">Rate</p>
                <p class="text-2xl font-extrabold text-emerald-600" th:text="${fd.interestRate} + '%'">0%</p>
              </div>
              <div class="text-center">
                <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-1">Maturity</p>
                <p class="text-2xl font-extrabold text-blue-600">₹<span th:text="${#numbers.formatDecimal(fd.maturityAmount, 0, 'COMMA', 2, 'POINT')}">0</span></p>
              </div>
            </div>
          </div>

          <!-- Dates + Actions -->
          <div class="mt-5 pt-4 border-t border-gray-50 flex flex-wrap justify-between items-center gap-3">
            <div class="flex items-center gap-4 text-sm text-gray-500">
              <span><i class="fa-solid fa-calendar-plus mr-1 text-blue-400"></i>Applied: <strong th:text="${fd.startDate}">-</strong></span>
              <span><i class="fa-solid fa-calendar-xmark mr-1 text-orange-400"></i>Matures: <strong th:text="${fd.maturityDate}">-</strong></span>
              <span th:if="${fd.nomineeName != null and fd.nomineeName != ''}">
                <i class="fa-solid fa-user-shield mr-1 text-purple-400"></i>Nominee: <strong th:text="${fd.nomineeName}">-</strong>
              </span>
            </div>
            <div class="flex gap-2">
              <form th:action="@{'/staff/verify-fd/' + ${fd.id}}" method="post">
                <button type="submit" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-5 py-2 rounded-xl text-sm transition flex items-center gap-2 shadow">
                  <i class="fa-solid fa-circle-check"></i> Verify & Forward
                </button>
              </form>
              <form th:action="@{'/staff/reject-fd/' + ${fd.id}}" method="post">
                <button type="submit" class="bg-red-500 hover:bg-red-600 text-white font-bold px-5 py-2 rounded-xl text-sm transition flex items-center gap-2 shadow"
                        onclick="return confirm('Reject this FD application?')">
                  <i class="fa-solid fa-circle-xmark"></i> Reject
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
