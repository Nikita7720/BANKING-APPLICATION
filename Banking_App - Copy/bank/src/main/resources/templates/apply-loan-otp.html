<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Loan Application - SecureBank</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen pb-20">

  <!-- Header -->
  <div class="bg-gradient-to-br from-indigo-700 to-blue-800 text-white shadow-lg relative pb-6">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 text-center">
      <span class="font-bold text-2xl tracking-wide"><i class="fa-solid fa-shield-halved"></i> Security Check</span>
    </div>
  </div>

  <main class="max-w-md mx-auto px-4 py-10">
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden text-center">
      
      <div class="p-8">
        <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-sm">
          <i class="fa-solid fa-envelope-open-text"></i>
        </div>
        
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Verify Your Email</h2>
        <p class="text-gray-500 mb-6">We've sent a 6-digit OTP to your registered email address. Please enter it below to confirm your loan application.</p>

        <div th:if="${msg}" class="bg-red-100 text-red-700 p-3 rounded-lg mb-5 text-sm font-semibold shadow-sm" th:text="${msg}"></div>

        <form action="/loan-verify-otp" method="post" class="space-y-6">
          <div>
            <input type="text" name="otp" placeholder="••••••" required maxlength="6"
                   class="w-full border-2 border-gray-200 p-4 rounded-xl focus:outline-none focus:border-indigo-500 text-center tracking-[1em] font-mono text-2xl text-gray-800 bg-gray-50">
          </div>
          <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl transition shadow-lg text-lg">
            Confirm Application
          </button>
        </form>

      </div>
    </div>
  </main>

</body>
</html>
