<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager - Verified Loans</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-xl">
      <div class="p-6 border-b border-slate-800 text-center">
        <h2 class="text-2xl font-bold"><i class="fa-solid fa-shield-halved"></i> SecureBank</h2>
        <p class="text-slate-400 text-sm mt-1">Manager Portal</p>
      </div>
      <nav class="flex-1 px-4 py-6 space-y-2">
        <a href="/manager-dashboard" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 transition">
          <i class="fa-solid fa-house"></i> Dashboard
        </a>
        <a href="/manager/verified-loans" class="flex items-center gap-3 px-4 py-3 rounded-lg bg-slate-800 text-white shadow-md">
          <i class="fa-solid fa-hand-holding-dollar"></i> Loan Approvals
        </a>
      </nav>
      <div class="p-4 border-t border-slate-800">
        <a href="/logout" class="flex items-center justify-center gap-2 w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg transition">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto bg-gray-50">
      
      <header class="bg-white shadow-sm border-b border-gray-200 px-8 py-5 flex justify-between items-center sticky top-0 z-10">
        <div>
          <h1 class="text-2xl font-bold text-gray-800">Final Loan Approvals</h1>
          <p class="text-sm text-gray-500">Approve and disburse loans verified by staff</p>
        </div>
      </header>

      <div class="p-8">
        <div th:if="${success}" class="bg-green-100 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-6 shadow-sm" role="alert">
          <span class="block sm:inline" th:text="${success}"></span>
        </div>

        <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
              <thead class="bg-gray-50">
                <tr>
                  <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Customer Info</th>
                  <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Account Details</th>
                  <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Loan Details</th>
                  <th class="px-6 py-4 text-center text-xs font-bold text-gray-500 uppercase tracking-wider">Documents</th>
                  <th class="px-6 py-4 text-center text-xs font-bold text-gray-500 uppercase tracking-wider">Actions</th>
                </tr>
              </thead>
              <tbody class="bg-white divide-y divide-gray-200">
                <tr th:each="loan : ${loans}" class="hover:bg-slate-50 transition">
                  <td class="px-6 py-4 whitespace-nowrap">
                    <div class="text-sm font-bold text-gray-800" th:text="${loan.customerName}"></div>
                    <div class="text-xs text-gray-500" th:text="${loan.customerEmail}"></div>
                    <div class="text-xs text-gray-600 mt-1">
                      <span class="font-semibold text-gray-400">PAN:</span> <span th:text="${loan.pan}"></span>
                    </div>
                    <div class="text-xs text-gray-600">
                      <span class="font-semibold text-gray-400">Aadhar:</span> <span th:text="${loan.aadhar}"></span>
                    </div>
                  </td>
                  <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">
                    <div class="font-bold text-slate-700" th:text="'A/C: ' + ${loan.accountNumber}"></div>
                    <div class="text-xs font-semibold text-gray-500 mt-1" th:text="'IFSC: ' + ${loan.ifscCode}"></div>
                  </td>
                  <td class="px-6 py-4 whitespace-nowrap">
                    <div class="text-sm font-bold text-gray-800" th:text="'₹' + ${loan.amount}"></div>
                    <div class="text-xs text-gray-500" th:text="${loan.employmentType} + ' | ' + ${loan.durationMonths} + ' Months'"></div>
                    <div class="text-xs text-green-600 font-bold mt-1" th:if="${loan.monthlyIncome != null}" th:text="'Income: ₹' + ${loan.monthlyIncome}"></div>
                  </td>
                  <td class="px-6 py-4 whitespace-nowrap text-center text-xs font-bold">
                    <div class="flex flex-col gap-1 items-center">
                      <a th:if="${loan.document != null}" th:href="@{'/loan-document/' + ${loan.id} + '/document'}" target="_blank" class="px-2 py-0.5 bg-green-100 text-green-700 hover:bg-green-200 rounded w-full cursor-pointer block text-center shadow-sm">Salary Slip</a>
                      <a th:if="${loan.aadharCardPhoto != null}" th:href="@{'/loan-document/' + ${loan.id} + '/aadhar'}" target="_blank" class="px-2 py-0.5 bg-blue-100 text-blue-700 hover:bg-blue-200 rounded w-full cursor-pointer block text-center shadow-sm">Aadhar</a>
                      <a th:if="${loan.panCardPhoto != null}" th:href="@{'/loan-document/' + ${loan.id} + '/pan'}" target="_blank" class="px-2 py-0.5 bg-indigo-100 text-indigo-700 hover:bg-indigo-200 rounded w-full cursor-pointer block text-center shadow-sm">PAN</a>
                      <a th:if="${loan.userPhoto != null}" th:href="@{'/loan-document/' + ${loan.id} + '/photo'}" target="_blank" class="px-2 py-0.5 bg-purple-100 text-purple-700 hover:bg-purple-200 rounded w-full cursor-pointer block text-center shadow-sm">Photo</a>
                      <a th:if="${loan.signature != null}" th:href="@{'/loan-document/' + ${loan.id} + '/signature'}" target="_blank" class="px-2 py-0.5 bg-teal-100 text-teal-700 hover:bg-teal-200 rounded w-full cursor-pointer block text-center shadow-sm">Signature</a>
                    </div>
                  </td>
                  <td class="px-6 py-4 whitespace-nowrap text-center">
                    <div class="flex items-center justify-center gap-2">
                      <form th:action="@{/manager/approve-loan/{id}(id=${loan.id})}" method="post" onsubmit="return confirm('Are you sure you want to approve this loan and disburse funds?');">
                        <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition shadow-sm flex items-center gap-2">
                          <i class="fa-solid fa-check"></i> Approve & Disburse
                        </button>
                      </form>
                      <form th:action="@{/manager/reject-loan/{id}(id=${loan.id})}" method="post" onsubmit="return confirm('Are you sure you want to reject this loan?');">
                        <button type="submit" class="bg-red-100 hover:bg-red-200 text-red-700 px-3 py-2 rounded-lg text-sm font-bold transition">
                          <i class="fa-solid fa-xmark"></i>
                        </button>
                      </form>
                    </div>
                  </td>
                </tr>
                <tr th:if="${#lists.isEmpty(loans)}">
                  <td colspan="4" class="px-6 py-12 text-center text-gray-500">
                    <i class="fa-solid fa-folder-open text-4xl mb-3 text-gray-300"></i>
                    <p class="text-lg">No verified loans pending approval</p>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
