<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance History - Staff Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

  <nav class="bg-teal-800 text-white shadow-lg p-4 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold"><i class="fa-solid fa-clock-rotate-left"></i> Attendance History</h1>
      <a href="/staff-dashboard" class="hover:underline text-sm"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8">
    
    <div class="bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden">
      <div class="p-6 border-b border-gray-100 flex justify-between items-center">
        <div>
          <h2 class="text-2xl font-bold text-gray-800">My Attendance Logs</h2>
          <p class="text-gray-500 text-sm mt-1">Review all your daily check-in and check-out records.</p>
        </div>
      </div>
      
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-indigo-50 text-indigo-800 uppercase text-xs tracking-wider">
              <th class="p-4 border-b font-semibold rounded-tl-lg">Date</th>
              <th class="p-4 border-b font-semibold">Check In Time</th>
              <th class="p-4 border-b font-semibold">Check Out Time</th>
              <th class="p-4 border-b font-semibold">Status</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
            <tr th:each="att : ${attendanceHistory}" class="hover:bg-gray-50 transition">
              <td class="p-4 font-medium text-gray-800" th:text="${att.attendanceDate}">2026-05-10</td>
              <td class="p-4 text-gray-600" th:text="${att.checkInTime != null ? att.checkInTime : '--:--'}">09:00 AM</td>
              <td class="p-4 text-gray-600" th:text="${att.checkOutTime != null ? att.checkOutTime : '--:--'}">05:00 PM</td>
              <td class="p-4">
                <span th:if="${att.status == 'PRESENT' and att.checkOutTime == null}" class="px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700">PRESENT</span>
                <span th:if="${att.status == 'PRESENT' and att.checkOutTime != null}" class="px-3 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-700"><i class="fa-solid fa-check-double mr-1"></i> Shift Completed</span>
                <span th:if="${att.status == 'ABSENT'}" class="px-3 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700">ABSENT</span>
                <span th:if="${att.status != 'PRESENT' and att.status != 'ABSENT'}" class="px-3 py-1 rounded-full text-xs font-bold bg-yellow-100 text-yellow-700" th:text="${att.status}"></span>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(attendanceHistory)}">
              <td colspan="4" class="p-12 text-center text-gray-400">
                <i class="fa-solid fa-clock-rotate-left text-4xl mb-3"></i>
                <p>No attendance history found.</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    
  </main>

</body>
</html>
