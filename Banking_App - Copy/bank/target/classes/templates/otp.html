<!DOCTYPE html>
<html>
<head>
<title>OTP Verification</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-xl w-96">

<h2 class="text-xl font-bold text-center mb-5">Enter OTP</h2>

<form action="/otp" method="post" class="space-y-4">

<input type="text" name="otp" placeholder="Enter OTP"
       class="w-full p-3 border rounded text-center text-xl" required>

<button class="w-full bg-green-600 text-white p-3 rounded">
Verify OTP
</button>

</form>

</div>

</body>
</html>
