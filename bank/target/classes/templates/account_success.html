<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Account Opening – Success</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #2c5364);
            color: #f0f0f0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 2rem 3rem;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 4px 30px rgba(0,0,0,.5);
        }
        h1 { font-size: 2rem; margin-bottom: .5rem; }
        p  { margin: .8rem 0; }
        a {
            display: inline-block;
            margin-top: 1.5rem;
            padding: .6rem 1.4rem;
            background: #ffb74d;
            color: #212121;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background .2s;
        }
        a:hover { background: #ffa726; }
    </style>
</head>
<body>
<div class="card">
    <h1>🎉 Application Submitted!</h1>
    <p>Your account opening request has been saved successfully.</p>
    <p>We will review it shortly. You can now log in or return to the dashboard.</p>
    <a th:href="@{/login_customer}">Go to Login</a>
</div>
</body>
</html>
