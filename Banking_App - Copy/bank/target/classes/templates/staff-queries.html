<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Queries - Staff | SecureBank</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="bg-gradient-to-r from-orange-600 to-red-700 text-white pb-20 pt-10 px-4 shadow-lg rounded-b-3xl">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <div>
        <a href="/staff-dashboard" class="text-orange-100 hover:text-white transition flex items-center gap-2 mb-2">
          <i class="fa-solid fa-arrow-left"></i> Staff Dashboard
        </a>
        <h1 class="text-3xl font-extrabold tracking-tight">Customer Support Inbox</h1>
        <p class="text-orange-100 mt-1">Resolve pending customer queries and issues</p>
      </div>
      <div class="bg-white/20 p-4 rounded-3xl backdrop-blur-md">
        <i class="fa-solid fa-comments-question text-5xl"></i>
      </div>
    </div>
  </div>

  <main class="max-w-6xl mx-auto px-4 -mt-10 pb-20">
    
    <div th:if="${queries == null or queries.isEmpty()}" class="bg-white rounded-3xl p-20 text-center shadow-xl border border-gray-100">
      <div class="w-20 h-20 bg-gray-50 text-gray-200 rounded-full flex items-center justify-center mx-auto mb-6">
        <i class="fa-solid fa-inbox text-4xl"></i>
      </div>
      <h3 class="text-2xl font-bold text-gray-700">All Clear!</h3>
      <p class="text-gray-400 mt-2">There are no pending customer queries at the moment.</p>
    </div>

    <div th:if="${queries != null and !queries.isEmpty()}" class="grid gap-6">
      <div th:each="q : ${queries}" class="bg-white rounded-3xl p-6 shadow-xl border border-gray-100 flex flex-col md:flex-row justify-between gap-6 transition hover:shadow-2xl hover:scale-[1.01]">
        <div class="flex-1">
          <div class="flex items-center gap-3 mb-3">
            <span th:if="${q.status == 'PENDING'}" class="bg-yellow-100 text-yellow-700 text-[10px] px-2.5 py-1 rounded-full font-bold uppercase tracking-wider border border-yellow-200">
              <i class="fa-solid fa-clock mr-1"></i> New Query
            </span>
            <span th:if="${q.status == 'RESOLVED'}" class="bg-emerald-100 text-emerald-700 text-[10px] px-2.5 py-1 rounded-full font-bold uppercase tracking-wider border border-emerald-200">
              <i class="fa-solid fa-check-circle mr-1"></i> Resolved
            </span>
            <span class="text-xs text-gray-400" th:text="${#temporals.format(q.createdAt, 'dd MMM yyyy, hh:mm a')}"></span>
          </div>
          
          <h3 class="text-xl font-bold text-gray-800 mb-1" th:text="${q.subject}">Subject Line</h3>
          <p class="text-sm text-gray-600 leading-relaxed mb-4" th:text="${q.message}">Message content goes here...</p>
          
          <div class="flex items-center gap-4 py-3 border-t border-gray-50 mt-4">
            <div class="flex items-center gap-2 text-xs font-semibold text-gray-500">
              <i class="fa-solid fa-user text-orange-500"></i> <span th:text="${q.customerName}">Customer Name</span>
            </div>
            <div class="flex items-center gap-2 text-xs font-semibold text-gray-500">
              <i class="fa-solid fa-envelope text-orange-500"></i> <span th:text="${q.email}">Email</span>
            </div>
          </div>
        </div>

        <div th:if="${q.status == 'PENDING'}" class="flex items-center md:border-l border-gray-100 md:pl-8">
          <form action="/staff/resolve-query" method="post">
            <input type="hidden" name="id" th:value="${q.id}">
            <button type="submit" class="bg-emerald-600 text-white font-bold py-3 px-8 rounded-2xl shadow-lg hover:bg-emerald-700 transition flex items-center gap-2 whitespace-nowrap">
              <i class="fa-solid fa-check-double"></i> Mark as Resolved
            </button>
          </form>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
