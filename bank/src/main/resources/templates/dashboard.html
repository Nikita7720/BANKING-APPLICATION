<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>SecureBank - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {font-family: 'Inter', sans-serif;}
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-blue-900 to-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl w-full max-w-lg p-8 text-center">
        <h2 class="text-3xl font-bold text-white mb-6">Welcome, <span th:text="${app.email}"></span>!</h2>
        <p class="text-blue-200 mb-8">Choose an action:</p>
        <a href="/Register_customer" class="inline-block bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 px-6 rounded-lg mb-4 transition">Create New Account</a>
        <a href="/account_overview" class="inline-block bg-green-600 hover:bg-green-500 text-white font-semibold py-3 px-6 rounded-lg transition">Existing Account</a>
    </div>
</body>
</html>
