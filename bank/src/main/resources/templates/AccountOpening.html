<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create New Bank Account</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #f0f4f8, #e0e7ff);
      min-height: 100vh;
      padding: 12px;
    }
    .container {
      max-width: 480px;        /* Size khup kami kele */
      margin: 10px auto;
      background: white;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      color: white;
      padding: 16px;
      text-align: center;
    }
    .header h1 { font-size: 22px; }
    .form-content { padding: 20px 18px; }
    h2 {
      color: #1e40af;
      margin: 18px 0 8px;
      border-bottom: 2px solid #e0e7ff;
      padding-bottom: 4px;
    }
    label {
      display: block;
      margin: 8px 0 4px;
      font-weight: 600;
      font-size: 14.5px;
      color: #374151;
    }
    input[type="text"], input[type="email"], input[type="date"], input[type="tel"], select, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 15px;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .radio-group { margin: 8px 0; }
    .row { display: flex; gap: 8px; }
    .row input { flex: 1; }
    .btn {
      background: #1e40af;
      color: white;
      padding: 13px;
      font-size: 17px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>🏦 Create New Bank Account</h1>
    </div>

    <div class="form-content">
      <form action="/saveUser" method="post" enctype="multipart/form-data">

        <h2>1. Personal Details</h2>
        <label>Full Name</label>
        <input type="text" name="fullname" required>

        <label>Father Name</label>
        <input type="text" name="father" required>

        <div class="radio-group">
          <label>Gender</label><br>
          <input type="radio" name="gender" value="Male"> Male &nbsp;&nbsp;
          <input type="radio" name="gender" value="Female"> Female
        </div>

        <label>DOB</label>
        <input type="date" name="dob" required>

        <label>Email</label>
        <input type="email" name="email">

        <label>Marital Status</label>
        <select name="marital_status">
          <option>Married</option>
          <option>Unmarried</option>
          <option>Other</option>
        </select>

        <label>Address</label>
        <textarea name="address" rows="2"></textarea>

        <div class="row">
          <div><label>City</label><input type="text" name="city"></div>
          <div><label>State</label><input type="text" name="state"></div>
          <div><label>Pin</label><input type="text" name="pin" maxlength="6"></div>
        </div>

        <label>Photo</label>
        <input type="file" name="file" required>

        <h2>2. Additional Details</h2>

        <label>Religion</label>
        <input type="text" name="religion">

        <label>Category</label>
        <input type="text" name="category">

        <label>Income</label>
        <input type="text" name="income">

        <label>Qualification</label>
        <input type="text" name="qualification">

        <label>Occupation</label>
        <input type="text" name="occupation">

        <label>PAN</label>
        <input type="text" name="pan" maxlength="10">

        <label>Aadhaar</label>
        <input type="text" name="aadhar" maxlength="12">

        <div class="radio-group">
          <label>Senior Citizen</label><br>
          <input type="radio" name="senior_citizen" value="Yes"> Yes &nbsp;&nbsp;
          <input type="radio" name="senior_citizen" value="No"> No
        </div>

        <div class="radio-group">
          <label>Existing Account</label><br>
          <input type="radio" name="existing_account" value="Yes"> Yes &nbsp;&nbsp;
          <input type="radio" name="existing_account" value="No"> No
        </div>

        <h2>3. Account Details</h2>

        <label>Account Type</label>
        <div class="radio-group">
          <input type="radio" name="account_type" value="Savings"> Savings &nbsp;&nbsp;
          <input type="radio" name="account_type" value="Current"> Current<br>
          <input type="radio" name="account_type" value="Fixed Deposit"> Fixed Deposit
        </div>

        <br>
        <input type="checkbox" required> I declare all details are correct.

        <br><br>
        <button type="submit" class="btn">Submit Application</button>

      </form>
    </div>
  </div>
  <script th:if="${msg}">
alert('[[${msg}]]');
</script>

</body>
</html>
