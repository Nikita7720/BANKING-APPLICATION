<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password | SecureBank</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Header -->
  <div class="bg-indigo-700 text-white pb-20 pt-10 px-4">
    <div class="max-w-md mx-auto text-center">
      <h1 class="text-3xl font-extrabold">Security Settings</h1>
      <p class="text-indigo-100 mt-2">Manage and update your account password</p>
    </div>
  </div>

  <main class="max-w-md mx-auto px-4 -mt-10 pb-20">
    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
      
      <div class="p-8">
        <!-- Success/Error Messages -->
        <div th:if="${success}" class="bg-green-100 text-green-700 p-4 rounded-2xl mb-6 text-sm font-bold flex items-center gap-2">
          <i class="fa-solid fa-circle-check"></i> <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="bg-red-100 text-red-700 p-4 rounded-2xl mb-6 text-sm font-bold flex items-center gap-2">
          <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}"></span>
        </div>

        <form action="/customer/update-password" method="post" class="space-y-6">
          <div>
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Current Password</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                <i class="fa-solid fa-lock"></i>
              </span>
              <input type="password" name="currentPassword" required
                     class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
                     placeholder="••••••••">
            </div>
          </div>

          <div class="h-px bg-gray-100"></div>

          <div>
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">New Password</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                <i class="fa-solid fa-key"></i>
              </span>
              <input type="password" name="newPassword" required
                     class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
                     placeholder="••••••••">
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Confirm New Password</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                <i class="fa-solid fa-shield-check"></i>
              </span>
              <input type="password" name="confirmPassword" required
                     class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
                     placeholder="••••••••">
            </div>
          </div>

          <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition transform hover:-translate-y-1">
            Update Password
          </button>
          
          <a href="/customer-dashboard" class="block text-center text-sm font-bold text-gray-400 hover:text-gray-600 transition mt-4">
            Cancel and Return
          </a>
        </form>
      </div>
    </div>
  </main>

</body>
</html>
